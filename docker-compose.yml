services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile.dev
    ports:
      - "5001:5001"
    environment:
      PORT: "5001"
      NODE_ENV: development
      ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      # Reliable file watch when server code is bind-mounted from macOS/Windows
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./server:/app/server
      - server_node_modules:/app/server/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10

  client:
    build:
      context: .
      dockerfile: client/Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
    volumes:
      - ./client:/app/client
      - client_node_modules:/app/client/node_modules
    depends_on:
      server:
        condition: service_healthy

  server_prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "5001:5001"
    environment:
      PORT: "5001"
      NODE_ENV: production
      ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  server_node_modules:
  client_node_modules:
