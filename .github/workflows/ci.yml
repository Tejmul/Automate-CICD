# Rubric: Push/PR → Tests → Terraform Apply → Docker Build & Push → ECS Fargate
#
# Secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_REGION
#
# PR / fork: Phase 1 only. Push to main (or workflow_dispatch on main): full pipeline.

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Phase 1 — Testing (unit + integration + reports) ─────────────────────
  test:
    name: Phase 1 — Tests & reports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Server — lint, format, tests
        working-directory: server
        env:
          JEST_JUNIT_OUTPUT_DIR: reports
        run: |
          npm ci
          npm run lint
          npm run format:check
          npm run test:ci

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Client — lint, format, tests, build
        working-directory: client
        run: |
          npm ci
          npm run lint
          npm run format:check
          mkdir -p test-results
          npm run test:ci
          npm run build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          if-no-files-found: ignore
          path: |
            server/reports/junit.xml
            server/coverage/lcov.info
            client/test-results/*.xml

  # ── Phase 2 — Terraform (S3 rubric + ECS infra) ─────────────────────────────
  terraform:
    name: Phase 2 — Terraform init / validate / plan / apply
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    env:
      TF_IN_AUTOMATION: true
      TF_VAR_aws_region: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}
    outputs:
      ecr_repository_url: ${{ steps.tf-output.outputs.ecr_repository_url }}
      ecs_cluster_name: ${{ steps.tf-output.outputs.ecs_cluster_name }}
      ecs_service_name: ${{ steps.tf-output.outputs.ecs_service_name }}
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}

      - name: Cache Terraform state
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: tfstate-${{ github.repository }}-v1-${{ github.ref_name }}

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform outputs
        id: tf-output
        run: |
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecs_service_name=$(terraform output -raw ecs_service_name)" >> "$GITHUB_OUTPUT"

  # ── Phase 3 — Docker, ECR, ECS Fargate ────────────────────────────────────
  docker-build-push:
    name: Phase 3a — Build & push image
    needs: [terraform]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push
        env:
          ECR_URL: ${{ needs.terraform.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "$ECR_URL" ]; then
            echo "::error::ECR_URL is empty. Check that Terraform output 'ecr_repository_url' has a value."
            exit 1
          fi
          docker build -t "$ECR_URL:$IMAGE_TAG" -t "$ECR_URL:latest" .
          docker push "$ECR_URL:$IMAGE_TAG"
          docker push "$ECR_URL:latest"

  deploy-ecs:
    name: Phase 3b — Deploy to ECS & verify
    needs: [terraform, docker-build-push]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    env:
      ECS_CLUSTER: ${{ needs.terraform.outputs.ecs_cluster_name }}
      ECS_SERVICE: ${{ needs.terraform.outputs.ecs_service_name }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"

      - name: Verify running task
        run: |
          TASK_ARN=$(aws ecs list-tasks \
            --cluster "$ECS_CLUSTER" \
            --service-name "$ECS_SERVICE" \
            --query 'taskArns[0]' \
            --output text \
            --region "$AWS_REGION")

          echo "Running task: $TASK_ARN"

          aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].{status:lastStatus,health:healthStatus,startedAt:startedAt}' \
            --output table \
            --region "$AWS_REGION"
