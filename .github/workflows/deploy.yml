name: Deploy to EC2 

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy backend
        run: |
          cd "$GITHUB_WORKSPACE/server"
          npm ci
          npx prisma migrate deploy
          pm2 restart shopsmart-backend || pm2 start src/index.js --name shopsmart-backend
          pm2 save

      - name: Build frontend
        run: |
          cd "$GITHUB_WORKSPACE/client"
          npm ci
          npm run build
          sudo rm -rf /var/www/shopsmart/client/dist
          sudo mkdir -p /var/www/shopsmart/client
          sudo cp -r dist /var/www/shopsmart/client/

      - name: Restart nginx
        run: |
          sudo systemctl restart nginx

      - name: Health check
        run: |
          curl -fsS http://127.0.0.1:5001/api/health
