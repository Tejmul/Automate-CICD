name: Deploy to EC2 

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/github_actions
          chmod 600 ~/.ssh/github_actions
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/github_actions "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
            cd ~/Automate-CICD || cd ~/shopsmart

            git fetch origin
            git checkout main
            git pull origin main

            cd server
            npm ci
            npx prisma migrate deploy
            pm2 restart shopsmart-backend || pm2 start src/index.js --name shopsmart-backend
            pm2 save

            cd ../client
            npm ci
            npm run build

            sudo rm -rf /var/www/shopsmart/client/dist
            sudo mkdir -p /var/www/shopsmart/client
            sudo cp -r dist /var/www/shopsmart/client/
            sudo systemctl restart nginx
          EOF
