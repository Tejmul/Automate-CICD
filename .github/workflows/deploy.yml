name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify repository
        run: |
          echo "Repository contents:"
          ls -la

      - name: Deploy
        run: |
          echo "🚀 Deployment successful!"
          echo "Deployed commit: $GITHUB_SHA"
          echo "Time: $(date)"
